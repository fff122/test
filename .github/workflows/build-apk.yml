name: Build Android APK

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: Build release APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Show Flutter version
        run: flutter --version

      - name: Back up app sources
        run: |
          mkdir -p /tmp/xuebao_backup
          cp -R lib test pubspec.yaml analysis_options.yaml README.md /tmp/xuebao_backup/

      - name: Generate Android platform files
        run: flutter create . --platforms=android --project-name xuebao --org com.fff122 --no-pub

      - name: Restore app sources
        run: |
          cp -R /tmp/xuebao_backup/lib .
          cp -R /tmp/xuebao_backup/test .
          cp /tmp/xuebao_backup/pubspec.yaml .
          cp /tmp/xuebao_backup/analysis_options.yaml .
          cp /tmp/xuebao_backup/README.md .

      - name: Set Android app label
        run: sed -i 's/android:label="xuebao"/android:label="学宝"/' android/app/src/main/AndroidManifest.xml

      - name: Set Android SDK levels
        run: |
          if [ -f android/app/build.gradle.kts ]; then
            sed -i 's/compileSdk = flutter.compileSdkVersion/compileSdk = 35/' android/app/build.gradle.kts
            sed -i 's/minSdk = flutter.minSdkVersion/minSdk = 24/' android/app/build.gradle.kts
            sed -i 's/targetSdk = flutter.targetSdkVersion/targetSdk = 35/' android/app/build.gradle.kts
          else
            sed -i 's/compileSdkVersion flutter.compileSdkVersion/compileSdkVersion 35/' android/app/build.gradle
            sed -i 's/minSdkVersion flutter.minSdkVersion/minSdkVersion 24/' android/app/build.gradle
            sed -i 's/targetSdkVersion flutter.targetSdkVersion/targetSdkVersion 35/' android/app/build.gradle
          fi

      - name: Add Chinese OCR dependency
        run: |
          if [ -f android/app/build.gradle.kts ]; then
            printf '\n%s\n%s\n%s\n' \
              'dependencies {' \
              '    implementation("com.google.mlkit:text-recognition-chinese:16.0.1")' \
              '}' >> android/app/build.gradle.kts
          else
            printf '\n%s\n%s\n%s\n' \
              'dependencies {' \
              "    implementation 'com.google.mlkit:text-recognition-chinese:16.0.1'" \
              '}' >> android/app/build.gradle
          fi

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze
        run: flutter analyze

      - name: Build release APK
        run: flutter build apk --release

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: xuebao-release-apk
          path: build/app/outputs/flutter-apk/app-release.apk
          if-no-files-found: error
